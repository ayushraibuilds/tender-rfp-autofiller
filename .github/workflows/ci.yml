name: CI Verification

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install

    - name: Run ESLint
      run: npm run lint

    - name: Run Tests
      env:
        DATABASE_PROVIDER: sqlite
        GROQ_API_KEY: dummy
        JWT_SECRET: dummy_secret_ci
      run: rm -f .env && npm run test

    - name: Build Frontend
      run: npm run build
